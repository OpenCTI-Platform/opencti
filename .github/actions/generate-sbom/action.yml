name: Generate SBOM files
description: >
  Generates one or more SBOM files for OpenCTI docker images and uploads them as artifacts.
  The SBOM files are generated in CycloneDX JSON format.
  Supports two sources: "registry" (pull from Docker Hub) or "artifact" (load from a GitHub artifact tar file).

inputs:
  tags:
    description: 'JSON array of image tags (e.g. ["7.260619.0", "7.260619.0-ubi9", "7.260619.0-fips"])'
    required: true
  image_name:
    description: 'Docker image name without tag (e.g. "opencti/platform" or "opencti/worker")'
    required: false
    default: "opencti/platform"
  source:
    description: 'Where to get the image from: "registry" (Docker Hub) or "artifact" (GitHub artifact)'
    required: false
    default: "registry"
  artifact_name:
    description: 'Name of the GitHub artifact containing the docker image tar (required when source is "artifact")'
    required: false
    default: ""
  sbom_name:
    description: 'Name of the sbom file'
    required: false
    default: ""
  overwrite:
    description: "Overwrite existing artifacts if they already exist"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Install Syft
      uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 #v0.24.0

    - name: Download docker image artifact
      if: ${{ inputs.source == 'artifact' }}
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
      with:
        name: ${{ inputs.artifact_name }}
        path: /tmp/sbom-image

    - name: Load docker image from artifact
      if: ${{ inputs.source == 'artifact' }}
      shell: bash
      run: |
        for tarfile in /tmp/sbom-image/*.tar; do
          echo "Loading docker image from ${tarfile}"
          docker load --input "${tarfile}"
        done
        docker images

    - name: Generate SBOMs
      shell: bash
      env:
        TAGS: ${{ inputs.tags }}
        IMAGE_NAME: ${{ inputs.image_name }}
        SOURCE: ${{ inputs.source }}
      run: |
        for TAG in $(echo "${TAGS}" | jq -r '.[]'); do
          echo "::group::Processing tag: ${TAG}"

          IMAGE_REF="${IMAGE_NAME}:${TAG}"

          if [ "${SOURCE}" = "registry" ]; then
            echo "Verifying docker image exists in registry: ${IMAGE_REF}"
            if ! docker manifest inspect "${IMAGE_REF}" > /dev/null 2>&1; then
              echo "::error::Image ${IMAGE_REF} does not exist in the registry"
              exit 1
            fi
          else
            echo "Verifying docker image is loaded locally: ${IMAGE_REF}"
            if ! docker image inspect "${IMAGE_REF}" > /dev/null 2>&1; then
              echo "::error::Image ${IMAGE_REF} is not available locally"
              exit 1
            fi
          fi

          # Sanitize tag for filename (replace / and : with -)
          SAFE_TAG=$(echo "${TAG}" | tr '/:' '-')
          # Extract short name (e.g. "platform" from "filigran/platform")
          SHORT_NAME=$(echo "${IMAGE_NAME}" | awk -F/ '{print $NF}')

          echo "Generating SBOM for ${IMAGE_REF}"
          SBOM_FILE="sbom-${SHORT_NAME}-container-${SAFE_TAG}.cdx.json"
          syft "${IMAGE_REF}" \
            -c "${{ github.workspace }}/.github/.syft.yaml" \
            -o "cyclonedx-json@1.6=${SBOM_FILE}"

          echo "Injecting manufacturer metadata into ${SBOM_FILE}"
          jq --slurpfile mfr "${{ github.workspace }}/.github/sbom-manufacturer.json" \
            '.metadata.component.manufacturer = $mfr[0]' "${SBOM_FILE}" > tmp.cdx.json && mv tmp.cdx.json "${SBOM_FILE}"

          echo "::endgroup::"
        done

    - name: Upload SBOM artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: sbom-${{  inputs.sbom_name || inputs.artifact_name || inputs.image_name }}
        path: "*.cdx.json"
        overwrite: ${{ inputs.overwrite }}
        retention-days: 3

