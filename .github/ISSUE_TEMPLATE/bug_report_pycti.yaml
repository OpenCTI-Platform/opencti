name: Client Python bug
description: Report a bug in the Python client (pycti).
title: "fix(client-python): "
labels:
  - needs triage
  - bug
type: bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "A clear and concise description of the bug."
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "Python version, pycti version, OpenCTI version, OS."
      placeholder: |
        1. Python: 3.12
        2. pycti: 6.x
        3. OpenCTI: 6.x
        4. OS: Ubuntu 22.04
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproducible steps
      description: "Smallest reproducible scenario (code snippet welcome)."
    validations:
      required: true
  - type: textarea
    id: expected-actual
    attributes:
      label: Expected vs actual output
    validations:
      required: true
