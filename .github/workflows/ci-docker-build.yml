name: Build OpenCTI Platform and worker images

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Image Tag"
        type: string
        default: ${{ github.sha }}
      checkout_ref:
        description: "Reference of the branch or commit sha"
        type: string
        default: ${{ github.sha }}
      client_python_local:
        description: "Use client python from the same commit"
        type: boolean
        required: false
        default: false
      publish_to_registry:
        description: "Publish image to registry. If false, will save the image as github artifact"
        type: string
        required: false
        default: false
    outputs:
      image-tag-version-cleaned:
        description: "Image tag after formatting"
        value: ${{ jobs.build-opencti-platform.outputs.version }}
      image-tag-cleaned:
        description: "Image tags including image name after formatting"
        value: ${{ jobs.build-opencti-platform.outputs.tags }}

jobs:
  build-opencti-platform:
    name: Build OpenCTI Platform image
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}

    steps:
    - uses: actions/checkout@v7
      with:
        ref: ${{ inputs.checkout_ref }}

    - name: Use client-python in OpenCTI from same branch
      if: ${{ inputs.client_python_local == true }}
      run: sed -i 's|^pycti==.*$|pycti @ git+https://github.com/OpenCTI-Platform/opencti@${{ inputs.checkout_ref }}#subdirectory=client-python|' -i ./opencti-platform/opencti-graphql/src/python/requirements.txt

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        name: gha-builder-platform

    - name: Login to DockerHub
      if: inputs.publish_to_registry == 'true'
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Docker meta (builder)
      id: meta-builder
      uses: docker/metadata-action@v6
      with:
        images: filigran/builder
        tags: type=raw,value=${{ inputs.image_tag }}

    - name: Build (builder)
      uses: docker/build-push-action@v7
      with:
        context: opencti-platform
        file: opencti-platform/Dockerfile
        target: builder
        outputs: type=docker,dest=/tmp/opencti-builder.tar
        tags: ${{ steps.meta-builder.outputs.tags }}
        labels: ${{ steps.meta-builder.outputs.labels }}

    - name: Upload builder docker image artifact
      uses: actions/upload-artifact@v7
      with:
        name: docker-image-opencti-builder
        path: /tmp/opencti-builder.tar
        retention-days: 7

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: filigran/platform
        tags: type=raw,value=${{ inputs.image_tag }}

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: opencti-platform
        file: opencti-platform/Dockerfile
        push: ${{ inputs.publish_to_registry == 'true' }}
        outputs: ${{ inputs.publish_to_registry == 'false' && 'type=docker,dest=/tmp/opencti-platform.tar' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Upload opencti docker image artifact
      if: ${{ inputs.publish_to_registry == 'false' }}
      uses: actions/upload-artifact@v7
      with:
        name: docker-image-opencti-platform
        path: /tmp/opencti-platform.tar
        retention-days: 7

  build-opencti-worker:
    name: Build OpenCTI Worker image
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}

    steps:
    - uses: actions/checkout@v7
      with:
        ref: ${{ inputs.checkout_ref }}

    - name: Use client-python in worker from same branch
      if: ${{ inputs.client_python_local == true }}
      run: sed -i 's|^pycti==.*$|pycti @ git+https://github.com/OpenCTI-Platform/opencti@${{ inputs.checkout_ref }}#subdirectory=client-python|' -i ./opencti-worker/requirements.txt

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        name: gha-builder-worker

    - name: Login to DockerHub
      if: inputs.publish_to_registry == 'true'
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: filigran/worker
        tags: type=raw,value=${{ inputs.image_tag }}

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: opencti-worker
        file: opencti-worker/Dockerfile
        push: ${{ inputs.publish_to_registry == 'true' }}
        outputs: ${{ inputs.publish_to_registry == 'false' && 'type=docker,dest=/tmp/opencti-worker.tar' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: docker-image-opencti-worker
        path: /tmp/opencti-worker.tar
        retention-days: 7