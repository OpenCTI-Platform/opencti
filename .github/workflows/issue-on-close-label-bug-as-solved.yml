name: issue-on-close-label-bug-as-solved.yml
on:
  issues:
    types: [closed]

jobs:
  label-bug-as-solved:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Label bug as solved
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const stateReason = issue.state_reason;
            const issueTypeName = (issue.type?.name ?? '').toLowerCase();
            const labelNames    = (issue.labels ?? []).map(l => l.name.toLowerCase());
            const isBug =
              issueTypeName === 'bug' ||
              labelNames.includes('bug');
            
            if (isBug && stateReason === 'completed') {
              await github.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['solved']
              });
            }
