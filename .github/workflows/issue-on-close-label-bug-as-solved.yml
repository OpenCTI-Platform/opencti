name: Label completed bugs as solved
on:
  issues:
    types: [closed]

jobs:
  label-bug-as-solved:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Label bug as solved
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const stateReason = issue.state_reason;
            const issueTypeName = (issue.type?.name ?? '').toLowerCase();
            const labelNames    = (issue.labels ?? []).map(l => l.name.toLowerCase());
            const isBug =
              issueTypeName === 'bug' ||
              labelNames.includes('bug');
            
            if (isBug && stateReason === 'completed') {
              const labelName = 'solved';

              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: labelName,
                    color: '0e8a16',
                    description: 'Issue has been solved'
                  });
                } else {
                  throw error;
                }
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [labelName]
              });
            }
