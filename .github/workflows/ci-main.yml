name: OpenCTI CI
on:
  workflow_dispatch:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          predicate-quantifier: every
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!**/*.md'

  wf-build-image:
      name: Build image
      needs: changes
      if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
      uses: ./.github/workflows/ci-docker-build.yml
      with:
        checkout_ref: ${{ github.event_name == 'pull_request'  && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
        dockerfile_target: testing
        client_python_local: true
      secrets: inherit

  wf-backend-test:
      name: Backend
      uses: ./.github/workflows/ci-test-backend.yml
      needs: [changes, wf-build-image]
      if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
      with:
        checkout_ref: ${{ github.event_name == 'pull_request'  && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
        run-id: ${{ github.run_id }}
      secrets: inherit

  wf-frontend-test:
      name: Frontend
      needs: changes
      if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
      uses: ./.github/workflows/ci-test-frontend.yml
      with:
        checkout_ref: ${{ github.event_name == 'pull_request'  && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
      secrets: inherit

  wf-client-python-test:
      name: Client Python
      uses: ./.github/workflows/ci-test-client-python.yml
      needs: [changes, wf-build-image]
      if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
      with:
        checkout_ref: ${{ github.event_name == 'pull_request'  && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
      secrets: inherit

  wf-license-check:
      name: License check
      needs: changes
      if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
      uses: ./.github/workflows/ci-license-check.yml
      with:
        checkout_ref: ${{ github.event_name == 'pull_request'  && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
      secrets: inherit

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [wf-build-image, wf-backend-test, wf-frontend-test, wf-client-python-test, wf-license-check]
    if: always()
    steps:
      - name: Verify job results
        run: |
          build_image="${{ needs.wf-build-image.result }}"
          backend_test="${{ needs.wf-backend-test.result }}"
          frontend_test="${{ needs.wf-frontend-test.result }}"
          client_python_test="${{ needs.wf-client-python-test.result }}"
          license_check="${{ needs.wf-license-check.result }}"
          
          echo "Build Image: $build_image"
          echo "Backend Test: $backend_test"
          echo "Frontend Test: $frontend_test"
          echo "Client Python Test: $client_python_test"
          echo "License Check: $license_check"
          
          jobs="Build-Image:$build_image Backend-Test:$backend_test Frontend-Test:$frontend_test Client-Python-Test:$client_python_test License-Check:$license_check"
          
          has_failed=false
          for job in $jobs; do
            name="${job%%:*}"
            result="${job#*:}"
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "Error: Job '$name' has status '$result'."
              has_failed=true
            fi
          done
          
          if [ "$has_failed" = "true" ]; then
            exit 1
          fi
          echo "All jobs succeeded or were skipped."
