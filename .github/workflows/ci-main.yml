name: OpenCTI CI
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/*.md'
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/*.md'

jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.backend == 'true' }}
      frontend: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.frontend == 'true' }}
      client_python: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.client_python == 'true' }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name != 'workflow_dispatch'
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        if: github.event_name != 'workflow_dispatch'
        id: filter
        with:
          filters: |
            backend:
              - 'opencti-platform/opencti-graphql/**'
            frontend:
              - 'opencti-platform/opencti-front/**'
            client_python:
              - 'client-python/**'

  wf-build-image:
      name: Build image
      needs: detect-changes
      if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.client_python == 'true'
      uses: ./.github/workflows/ci-docker-build.yml
      with:
        checkout_ref: ${{ github.event_name == 'pull_request'  && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
        dockerfile_target: testing
        client_python_local: true
      secrets: inherit

  wf-backend-test:
      name: Backend
      needs: [detect-changes, wf-build-image]
      if: needs.detect-changes.outputs.backend == 'true'
      uses: ./.github/workflows/ci-test-backend.yml
      with:
        checkout_ref: ${{ github.event_name == 'pull_request'  && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
        run-id: ${{ github.run_id }}
      secrets: inherit

  wf-frontend-test:
      name: Frontend
      needs: detect-changes
      if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.backend == 'true'
      uses: ./.github/workflows/ci-test-frontend.yml
      with:
        checkout_ref: ${{ github.event_name == 'pull_request'  && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
      secrets: inherit

  wf-client-python-test:
      name: Client Python
      needs: [detect-changes, wf-build-image]
      if: needs.detect-changes.outputs.client_python == 'true'
      uses: ./.github/workflows/ci-test-client-python.yml
      with:
        checkout_ref: ${{ github.event_name == 'pull_request'  && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
      secrets: inherit

  wf-license-check:
      name: License check
      uses: ./.github/workflows/ci-license-check.yml
      with:
        checkout_ref: ${{ github.event_name == 'pull_request'  && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
      secrets: inherit
