name: OpenCTI CI for testing-xtm-one
on:
  workflow_dispatch:
  push:
    branches:
      - testing-xtm-one

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  wf-publish-image:
      name: Publish image (testing-xtm-one)
      uses: ./.github/workflows/ci-docker-build.yml
      with:
        checkout_ref: ${{ github.sha }}
        image_tag: testing-xtm-one
        client_python_local: true
        publish_to_registry: true
      secrets: inherit
