enum NewsFeedItemsOrdering {
  title
  news_feed_type
  creation_date
}

type NewsFeedItemMetadata {
  key: String!
  value: String
}

type NewsFeedItem implements InternalObject & BasicObject {
  id: ID!
  standard_id: String!
  entity_type: String!
  parent_types: [String!]!
  metrics: [Metric]

  title: String!
  news_feed_type: String!
  tags: [String!]!
  metadata: [NewsFeedItemMetadata!]!
  creation_date: DateTime!
  is_read: Boolean!
  user_id: String!
}

type NewsFeedItemConnection {
  pageInfo: PageInfo!
  edges: [NewsFeedItemEdge!]!
}

type NewsFeedItemEdge {
  cursor: String!
  node: NewsFeedItem!
}

type Query {
  myNewsFeeds(
    first: Int
    after: ID
    orderBy: NewsFeedItemsOrdering
    orderMode: OrderingMode
    filters: FilterGroup
    search: String
  ): NewsFeedItemConnection @auth
  myUnreadNewsFeedsCount: Int @auth
}


