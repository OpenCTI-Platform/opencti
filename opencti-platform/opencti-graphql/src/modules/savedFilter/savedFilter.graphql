type SavedFilter implements InternalObject & BasicObject {
    id: ID!
    standard_id: String!
    entity_type: String!
    parent_types: [String!]!
    metrics:[Metric]
    # SavedFilters
    name: String!
    filters: String!
    scope: String!
    creator_id: String
    # Sharing
    authorizedMembers: [MemberAccess!]!
    currentUserAccessRight: String
}

type SavedFilterEdge {
    cursor: String!
    node: SavedFilter!
}

type SavedFilterConnection {
    pageInfo: PageInfo!
    edges: [SavedFilterEdge!]
}

enum SavedFilterOrdering {
    name
    _score
}

input SavedFilterAddInput {
    name: String!
    filters: String!
    scope: String!
    authorized_members: [MemberAccessInput!]
}


type Query {
    savedFilters(
        first: Int
        after: ID
        orderBy: SavedFilterOrdering
        orderMode: OrderingMode
        filters: FilterGroup
        search: String
    ): SavedFilterConnection @auth
}

type Mutation {
    savedFilterAdd(input: SavedFilterAddInput!): SavedFilter @auth
    savedFilterDelete(id: ID!): ID @auth
    savedFilterFieldPatch(id: ID!, input: [EditInput!]): SavedFilter @auth
    savedFilterEditAuthorizedMembers(id: ID!, input: [MemberAccessInput!]!): SavedFilter @auth(for: [KNOWLEDGE_KNSHAREFILTERS])
}