type CustomView implements InternalObject & BasicObject {
    id: ID!
    entity_type: String!
    standard_id: String!
    parent_types: [String!]!
    metrics:[Metric]
    created_at: DateTime!
    updated_at: DateTime!
    # CustomView
    name: String!
    description: String
    manifest: String
    target_entity_type: String!
    authorizedMembers: [MemberAccess!]!
}

# Mutation
input CustomViewAddInput {
    name: String! @constraint(minLength: 2, format: "not-blank")
    description: String
    manifest: String
    target_entity_type: String!
    authorizedMembers: [MemberAccessInput!]
}

# Relay connections

type CustomViewsInfo {
    id: ID!
    name: String!
}

type CustomViewsContext {
    entity_type: String!
    custom_views_info: [CustomViewsInfo!]!
}

type CustomViewsInfoForSettings {
    id: ID!
    name: String!
    description: String!
    created_at: DateTime!
    updated_at: DateTime!
}

type CustomViewsSettings {
    can_have_custom_views: Boolean!
    custom_views_info: [CustomViewsInfoForSettings!]!
}

type Query {
    customViewsContext: [CustomViewsContext!]! @auth
    customView(id: String!): CustomView @auth(for: [EXPLORE])
    customViewsSettings(id: String!): CustomViewsSettings! @auth(for: [SETTINGS_SETCUSTOMIZATION])
    customViewSettings(id: ID!): CustomView @auth(for: [KNOWLEDGE, SETTINGS_SETCUSTOMIZATION])
}

# Mutations
type Mutation {
    customViewAdd(input: CustomViewAddInput!): CustomView @auth(for: [SETTINGS_SETCUSTOMIZATION])
    customViewDelete(id: ID!): ID @auth(for: [SETTINGS_SETCUSTOMIZATION])
}