type CustomView implements InternalObject & BasicObject {
    id: ID!
    entity_type: String!
    standard_id: String!
    parent_types: [String!]!
    metrics: [Metric]
    created_at: DateTime!
    updated_at: DateTime!
    # CustomView-specific fields
    name: String!
    description: String
    slug: String!
    manifest: String
    path: String! # Derived field, not stored in DB
    targetEntityType: String!
    enabled: Boolean
    default: Boolean
    toWidgetExport(widgetId: ID!): String! @auth(for: [SETTINGS_SETCUSTOMIZATION]) @ff(flags: ["CUSTOM_VIEW"])
}

type CustomViewsEdge {
    cursor: String!
    node: CustomView!
}

type CustomViewsConnection {
    pageInfo: PageInfo!
    edges: [CustomViewsEdge!]!
}

enum CustomViewsOrdering {
    name
}

type CustomViewsSettings {
    canEntityTypeHaveCustomViews: Boolean!
}

input CustomViewAddInput {
    name: String! @constraint(minLength: 2, format: "not-blank")
    description: String
    manifest: String
    targetEntityType: String!
    enabled: Boolean
    default: Boolean
}

input CustomViewDuplicateInput {
    name: String! @constraint(minLength: 2, format: "not-blank")
    description: String
    manifest: String
    target_entity_type: String!
    enabled: Boolean
    default: Boolean
}

# Queries
type Query {
    # Display a custom view
    customViewDisplay(id: ID!): CustomView @auth @ff(flags: ["CUSTOM_VIEW"])
    # List all custom views
    customViews(
        entityType: String
        first: Int
        after: ID
        orderBy: CustomViewsOrdering
        search: String
        orderMode: OrderingMode
    ): CustomViewsConnection! @auth @ff(flags: ["CUSTOM_VIEW"])
    # For a given entity type provides whether it is eligible to having custom views
    customViewsSettings(
        entityType: String!
    ): CustomViewsSettings! @auth(for: [SETTINGS_SETCUSTOMIZATION]) @ff(flags: ["CUSTOM_VIEW"])
    customView(id: ID!): CustomView @auth(for: [SETTINGS_SETCUSTOMIZATION]) @ff(flags: ["CUSTOM_VIEW"])
}

# Mutations
type Mutation {
    ## Administration use cases

    # Add a new custom view
    customViewAdd(input: CustomViewAddInput!): CustomView! @auth(for: [SETTINGS_SETCUSTOMIZATION]) @ff(flags: ["CUSTOM_VIEW"])
    customViewEdit(id: ID!, input: [EditInput!]!): CustomView @auth(for: [SETTINGS_SETCUSTOMIZATION])
    customViewWidgetConfigurationImport(id: ID!, input: ImportConfigurationInput!): CustomView @auth(for: [SETTINGS_SETCUSTOMIZATION])
    customViewDuplicate(input: CustomViewDuplicateInput!): CustomView @auth(for: [SETTINGS_SETCUSTOMIZATION])
    customViewDelete(id: ID!): ID! @auth(for: [SETTINGS_SETCUSTOMIZATION])
}

