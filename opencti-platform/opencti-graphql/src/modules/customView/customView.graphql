type CustomView implements InternalObject & BasicObject {
    id: ID!
    entity_type: String!
    standard_id: String!
    parent_types: [String!]!
    metrics:[Metric]
    created_at: DateTime!
    updated_at: DateTime!
    # CustomView-specific fields
    name: String!
    description: String
    manifest: String
    target_entity_type: String!
    authorizedMembers: [MemberAccess!]!
}

type CustomViewDisplay {
    manifest: String
}

type CustomViewDisplayContext {
    id: ID!
    name: String!
}

type CustomViewsDisplayContext {
    entity_type: String!
    custom_views_info: [CustomViewDisplayContext!]!
}

type CustomViewInfoForSettings {
    id: ID!
    name: String!
    description: String!
    created_at: DateTime!
    updated_at: DateTime!
}

type PaginatedCustomView {
    cursor: String!
    node: CustomViewInfoForSettings!
}

type PaginatedCustomViews {
    pageInfo: PageInfo!
    edges: [PaginatedCustomView!]!
}

type CustomViewsSettings {
    canEntityTypeHaveCustomViews: Boolean!
    customViews: PaginatedCustomViews
}

input CustomViewsSettingsPaginationOptions {
    first: Int
    after: ID
    orderBy: CustomViewOrdering
    orderMode: OrderingMode
    search: String
}

# Relay connections
enum CustomViewOrdering {
    name
    _score
}

# Mutation
input CustomViewAddInput {
    name: String! @constraint(minLength: 2, format: "not-blank")
    description: String
    manifest: String
    target_entity_type: String!
    authorizedMembers: [MemberAccessInput!]
}

# Queries
type Query {
    ## Platform user use cases

    # Provides context when browsing to know which custom views are
    # available for which entity types
    customViewsDisplayContext: [CustomViewsDisplayContext!]! @auth
    # Display a custom view
    customViewDisplay(id: String!): CustomViewDisplay @auth

    ## Administration use cases

    # For a given entity type provides whether it is eligible to having custom
    # views, along with the list of current custom views.
    # Optionally allows passing pagination/sorting/filtering options.
    customViewsSettings(
        entityType: String!
        options: CustomViewsSettingsPaginationOptions
    ): CustomViewsSettings! @auth(for: [SETTINGS_SETCUSTOMIZATION])
    customViewSettings(id: ID!): CustomView @auth(for: [KNOWLEDGE, SETTINGS_SETCUSTOMIZATION])
}

# Mutations
type Mutation {
    ## Administration use cases

    # Add a new custom view
    customViewAdd(input: CustomViewAddInput!): CustomView! @auth(for: [SETTINGS_SETCUSTOMIZATION])
    # Delete a custom view
    customViewDelete(id: ID!): ID! @auth(for: [SETTINGS_SETCUSTOMIZATION])
}

# Subscriptions
type Subscription {
    ## Administration use cases

    # Subscribe to changes on a custom view while editing it
    customView(id: ID!): CustomView! @auth(for: [SETTINGS_SETCUSTOMIZATION])
}