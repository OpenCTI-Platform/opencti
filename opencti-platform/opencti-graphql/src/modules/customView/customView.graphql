type CustomView implements InternalObject & BasicObject {
    id: ID!
    entity_type: String!
    standard_id: String!
    parent_types: [String!]!
    metrics: [Metric]
    created_at: DateTime!
    updated_at: DateTime!
    # CustomView-specific fields
    name: String!
    description: String
    slug: String!
    manifest: String
    path: String! # Derived field, not stored in DB
    targetEntityType: String!
}

type CustomViewsDisplayContext {
    entityType: String!
    customViews: [CustomView!]!
}

type CustomViewsSettings {
    canEntityTypeHaveCustomViews: Boolean!
    customViews: [CustomView!]!
}

# Queries
type Query {
    ## Platform user use cases
    
    # Provides context when browsing to know which custom views are
    # available for which entity types
    customViewsDisplayContext: [CustomViewsDisplayContext!] @auth @ff(flags: ["CUSTOM_VIEW"], softFail: true)
    # Display a custom view
    customViewDisplay(id: ID!): CustomView @auth @ff(flags: ["CUSTOM_VIEW"])

    ## Administration use cases

    # For a given entity type provides whether it is eligible to having custom
    # views, along with the list of current custom views.
    # Optionally allows passing pagination/sorting/filtering options.
    customViewsSettings(
        entityType: String!
    ): CustomViewsSettings! @auth(for: [SETTINGS_SETCUSTOMIZATION]) @ff(flags: ["CUSTOM_VIEW"])
}
