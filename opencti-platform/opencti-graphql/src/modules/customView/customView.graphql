type CustomView implements InternalObject & BasicObject {
    id: ID!
    entity_type: String!
    standard_id: String!
    parent_types: [String!]!
    metrics:[Metric]
    created_at: DateTime!
    updated_at: DateTime!
    # CustomView
    name: String!
    settings_types: [String!]!
    description: String
    manifest: String
    authorizedMembers: [MemberAccess!]
}

# Mutation
input CustomViewAddInput {
    name: String! @constraint(minLength: 2, format: "not-blank")
    description: String
    manifest: String
    authorizedMembers: [MemberAccessInput!]
    settings_types: [String!]
}

# Relay connections
type CustomViewEdge {
    cursor: String!
    node: CustomView!
}

type CustomViewConnection {
    pageInfo: PageInfo!
    edges: [CustomViewEdge!]!
}

enum CustomViewOrdering {
    name
    _score
}

type Query {
    customView(id: ID!): CustomView @auth(for: [KNOWLEDGE, SETTINGS_SETCUSTOMIZATION])
    customViews(
        first: Int
        after: ID
        orderBy: CustomViewOrdering
        orderMode: OrderingMode
        search: String
    ): CustomViewConnection @auth(for: [SETTINGS_SETCUSTOMIZATION])
}

# Mutations
type Mutation {
    customViewAdd(input: CustomViewAddInput!): CustomView @auth(for: [SETTINGS_SETCUSTOMIZATION])
    customViewDelete(id: ID!): ID @auth(for: [SETTINGS_SETCUSTOMIZATION])
}