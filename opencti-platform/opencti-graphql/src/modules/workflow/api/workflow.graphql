enum WorkflowActionMode {
  sync
  async
}

enum WorkflowExecutionStatus {
  pending
  completed
  error
}

type WorkflowActionConfig {
    type: String!
    params: JSON
    mode: WorkflowActionMode!
}

type WorkflowSerializedState {
    statusId: String!
    onEnter: [WorkflowActionConfig!]
    onExit: [WorkflowActionConfig!]
}

type WorkflowSerializedTransition {
    from: String!
    to: String!
    event: String!
    actions: [WorkflowActionConfig!]
    asyncActions: [WorkflowActionConfig!]
    syncActions: [WorkflowActionConfig!]
    conditions: JSON
    requiresOrganizationInput: Boolean
}

type WorkflowSchema {
    id: ID!
    name: String!
    initialState: String!
    states: [WorkflowSerializedState!]!
    transitions: [WorkflowSerializedTransition!]!
}

extend type EntitySetting {
    workflow_configuration: Boolean
    workflow_id: String
}

type WorkflowActionError {
    timestamp: DateTime
    message: String!
    source: String
}

type WorkflowPendingAsyncAction {
    id: ID!
    workId: String!
    type: String!
    status: String!
    processedCount: Int
    expectedCount: Int
    startedAt: DateTime
    lastActivityAt: DateTime
    errors: [WorkflowActionError!]
}

type WorkflowPendingTransition {
    event: String!
    toState: String!
    triggeredAt: DateTime!
    asyncActions: [WorkflowPendingAsyncAction!]!
}

type WorkflowTriggerResult {
    success: Boolean!
    newState: String
    reason: String
    status: Status
    instance: WorkflowInstance
    entity: BasicObject
    executionStatus: WorkflowExecutionStatus
    pendingTransition: WorkflowPendingTransition
}

type WorkflowTransition {
    event: String!
    toState: String!
    toStatus: Status
    actions: [String!]
    requiresOrganizationInput: Boolean
}

type WorkflowInstance {
    id: ID!
    currentState: String!
    currentStatus: Status
    allowedTransitions: [WorkflowTransition!]!
    pendingStatus: WorkflowExecutionStatus
    pendingError: String
    pendingTransition: WorkflowPendingTransition
}

extend type DraftWorkspace {
    workflowInstance: WorkflowInstance @auth(for: [KNOWLEDGE_KNUPDATE])
}

extend type Query {
    workflowDefinition(entityType: String!): WorkflowSchema @auth(for: [SETTINGS_SETCUSTOMIZATION])
    workflowInstance(entityId: String!): WorkflowInstance @auth(for: [KNOWLEDGE_KNUPDATE])
    allowedNextStatuses(entityId: String!): [Status!]! @auth(for: [KNOWLEDGE_KNUPDATE])
    allowedTransitions(entityId: String!): [WorkflowTransition!]! @auth(for: [KNOWLEDGE_KNUPDATE])
}

extend type Mutation {
    workflowDefinitionSet(entityType: String!, definition: String!): EntitySetting @auth(for: [SETTINGS_SETCUSTOMIZATION])
    workflowDefinitionDelete(entityType: String!): EntitySetting @auth(for: [SETTINGS_SETCUSTOMIZATION])
    triggerWorkflowEvent(entityId: String!, eventName: String!, runtimeParams: JSON): WorkflowTriggerResult! @auth(for: [KNOWLEDGE_KNUPDATE])
    retryPendingWorkflowTransitionActions(entityId: String!): WorkflowTriggerResult! @auth(for: [KNOWLEDGE_KNUPDATE])
    clearWorkflowPendingState(entityId: String!): WorkflowInstance! @auth(for: [SETTINGS])
    reportWorkflowAsyncActionResult(workflowInstanceId: String!, workflowActionId: String!, status: String!, error: String): Boolean @auth(for: [KNOWLEDGE_KNUPDATE])
}
