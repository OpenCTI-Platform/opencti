enum WorkflowActionMode {
  sync
  async
}

type WorkflowActionConfig {
    type: String!
    params: JSON
    mode: WorkflowActionMode!
}

type WorkflowSerializedState {
    statusId: String!
    onEnter: [WorkflowActionConfig!]
    onExit: [WorkflowActionConfig!]
}

type WorkflowSerializedTransition {
    from: String!
    to: String!
    event: String!
    actions: [WorkflowActionConfig!]
    conditions: JSON
    comment: String
}

type WorkflowSchema {
    id: ID!
    name: String!
    published: Boolean!
    errors: [WorkflowValidationError!]
    initialState: String!
    states: [WorkflowSerializedState!]!
    transitions: [WorkflowSerializedTransition!]!
}

type WorkflowValidationError {
    type: String!
    message: String!
    path: [WorkflowEntityRef!]
}

type WorkflowEntityRef {
    id: String!
    entity_type: String!
}

extend type EntitySetting {
    workflow_configuration: Boolean
    workflow_id: String
    published: Boolean
    errors: [WorkflowValidationError!]
}

type WorkflowTriggerResult {
    success: Boolean!
    newState: String
    reason: String
    status: Status
    instance: WorkflowInstance
    entity: BasicObject
}

type WorkflowTransition {
    event: String!
    toState: String!
    toStatus: Status
    comment: String
    actions: [String!]
}

type WorkflowLastHistoryEntry {
    state: String!
    event: String!
    user_id: String!
    timestamp: String!
    comment: String
}

type WorkflowInstance {
    id: ID!
    currentState: String!
    currentStatus: Status
    allowedTransitions: [WorkflowTransition!]!
    lastHistoryEntry: WorkflowLastHistoryEntry
}

extend type DraftWorkspace {
    workflowInstance: WorkflowInstance @auth(for: [KNOWLEDGE_KNUPDATE])
}

extend type Query {
    workflowDefinition(entityType: String!, allowDraft: Boolean): WorkflowSchema @auth(for: [SETTINGS_SETCUSTOMIZATION])
    workflowInstance(entityId: String!): WorkflowInstance @auth(for: [KNOWLEDGE_KNUPDATE])
    allowedNextStatuses(entityId: String!): [Status!]! @auth(for: [KNOWLEDGE_KNUPDATE])
    allowedTransitions(entityId: String!): [WorkflowTransition!]! @auth(for: [KNOWLEDGE_KNUPDATE])
}

extend type Mutation {
    workflowDefinitionSet(entityType: String!, definition: String!): EntitySetting @auth(for: [SETTINGS_SETCUSTOMIZATION])
    workflowDefinitionPublish(entityType: String!): EntitySetting @auth(for: [SETTINGS_SETCUSTOMIZATION])
    workflowDefinitionDelete(entityType: String!): EntitySetting @auth(for: [SETTINGS_SETCUSTOMIZATION])
    triggerWorkflowEvent(entityId: String!, eventName: String!, comment: String): WorkflowTriggerResult! @auth(for: [KNOWLEDGE_KNUPDATE])
}
