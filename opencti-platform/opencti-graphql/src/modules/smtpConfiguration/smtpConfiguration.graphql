type SmtpConfiguration {
  smtp_enabled: Boolean!
  use_db_config: Boolean!
  forced_sender_email: Boolean!
  sender_email_address: String
  hostname: String
  port: Int
  use_ssl: Boolean
  reject_unauthorized: Boolean
  auth_type: SmtpAuthType
  # Basic Auth
  username: String
  # OAuth2
  oauth_user: String
  oauth_client_id: String
  oauth_issuer: String
  oauth_refresh_token_expires_at: DateTime
}

enum SmtpAuthType {
  basic
  oauth2
}

input SmtpConfigurationAddInput {
  smtp_enabled: Boolean
  use_db_config: Boolean
  sender_email_address: String
  hostname: String
  port: Int
  use_ssl: Boolean
  reject_unauthorized: Boolean
  auth_type: SmtpAuthType
  username: String
  password: String
  oauth_user: String
  oauth_client_id: String
  oauth_client_secret: String
  oauth_issuer: String
  oauth_access_token: String
  oauth_refresh_token: String
  oauth_refresh_token_expires_at: DateTime
}

extend type Query {
  smtpConfiguration: SmtpConfiguration @auth(for: [SETTINGS_SETACCESSES])
}

extend type Mutation {
  smtpConfigurationEdit(input: SmtpConfigurationAddInput!): SmtpConfiguration @auth(for: [SETTINGS_SETACCESSES])
  smtpConfigurationDelete: Boolean @auth(for: [SETTINGS_SETACCESSES])
  smtpConfigurationTest(email: String!): Boolean @auth(for: [SETTINGS_SETACCESSES])
}
