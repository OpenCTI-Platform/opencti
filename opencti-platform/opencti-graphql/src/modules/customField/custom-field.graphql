# Value of a CustomFieldDefinition on a specific entity instance
type CustomFieldValue {
  field_id: ID!
  field_name: String!
  int_value: Int
  string_value: String
  boolean_value: Boolean
  date_value: DateTime
  select_value: String
}

input CustomFieldValueAddInput {
  field_id: ID!
  field_name: String!
  int_value: Int
  string_value: String
  boolean_value: Boolean
  date_value: DateTime
  select_value: String
}

# Per-entity-type settings of a custom field definition (mandatory / default value are per entity type - US.2)
type CustomFieldEntityTypeSetting {
  entity_type: String!
  mandatory: Boolean!
  default_value: String
}

type CustomFieldDefinition implements InternalObject & BasicObject {
  id: ID!
  standard_id: String!
  entity_type: String!
  parent_types: [String!]!
  metrics: [Metric]
  created: DateTime
  modified: DateTime
  # CustomFieldDefinition - mandatory attributes
  name: String!
  label: String!
  field_type: String!
  entity_types: [String!]
  # Per-entity-type mandatory / default_value settings (US.2)
  entity_type_settings: [CustomFieldEntityTypeSetting!]
  multiple: Boolean!
  # Common optional
  description: String
  # Integer-specific
  min_value: Int
  max_value: Int
  # Select-specific
  select_options: [String!]
}

# Ordering
enum CustomFieldDefinitionsOrdering {
  name
  label
  field_type
  created
  _score
}

# Relay connections
type CustomFieldDefinitionConnection {
  pageInfo: PageInfo!
  edges: [CustomFieldDefinitionEdge!]!
}
type CustomFieldDefinitionEdge {
  cursor: String!
  node: CustomFieldDefinition!
}

# Queries
type Query {
  customFieldDefinition(id: String!): CustomFieldDefinition @auth(for: [SETTINGS_SETCUSTOMIZATION]) @ff(flags: ["CUSTOM_FIELDS"])
  customFieldDefinitions(
    first: Int
    after: ID
    orderBy: CustomFieldDefinitionsOrdering
    orderMode: OrderingMode
    search: String
    filters: FilterGroup
  ): CustomFieldDefinitionConnection @auth(for: [SETTINGS_SETCUSTOMIZATION]) @ff(flags: ["CUSTOM_FIELDS"])
}

# Mutations
input CustomFieldDefinitionAddInput {
  name: String! @constraint(minLength: 2, format: "not-blank")
  label: String! @constraint(minLength: 2, format: "not-blank")
  field_type: String!
  entity_types: [String!]
  multiple: Boolean
  description: String
  created: DateTime
  # Integer-specific
  min_value: Int
  max_value: Int
  # Select-specific
  select_options: [String!]
}

type Mutation {
  customFieldDefinitionAdd(input: CustomFieldDefinitionAddInput!): CustomFieldDefinition @auth(for: [SETTINGS_SETCUSTOMIZATION]) @ff(flags: ["CUSTOM_FIELDS"])
  customFieldDefinitionDelete(id: ID!): ID @auth(for: [SETTINGS_SETCUSTOMIZATION]) @ff(flags: ["CUSTOM_FIELDS"])
  customFieldDefinitionFieldPatch(id: ID!, input: [EditInput!]!): CustomFieldDefinition @auth(for: [SETTINGS_SETCUSTOMIZATION]) @ff(flags: ["CUSTOM_FIELDS"])
  customFieldDefinitionAddEntityType(id: ID!, entityType: String!, mandatory: Boolean!, default_value: String): CustomFieldDefinition @auth(for: [SETTINGS_SETCUSTOMIZATION]) @ff(flags: ["CUSTOM_FIELDS"])
  customFieldDefinitionUpdateEntityType(id: ID!, entityType: String!, mandatory: Boolean!, default_value: String): CustomFieldDefinition @auth(for: [SETTINGS_SETCUSTOMIZATION]) @ff(flags: ["CUSTOM_FIELDS"])
  customFieldDefinitionRemoveEntityType(id: ID!, entityType: String!): CustomFieldDefinition @auth(for: [SETTINGS_SETCUSTOMIZATION]) @ff(flags: ["CUSTOM_FIELDS"])
}
