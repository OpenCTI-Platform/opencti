services:
  opencti-dev-redis:
    container_name: opencti-dev-redis
    image: redis:8.6.3
    restart: unless-stopped
    ports:
      - 6379:6379
  opencti-dev-redis-insight:
    container_name: opencti-dev-redis-insight
    image: redislabs/redisinsight:latest
    restart: unless-stopped
    ports:
      - 8001:8001
      - 5540:5540
  opencti-dev-elasticsearch:
    container_name: opencti-dev-elasticsearch
    image: elasticsearch:8.19.16
    volumes:
      - esdata:/usr/share/elasticsearch/data
      - essnapshots:/usr/share/elasticsearch/snapshots
    environment:
      - discovery.type=single-node
      - xpack.ml.enabled=false
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2G -Xmx2G"
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - 9200:9200
      - 9300:9300
  opencti-dev-kibana:
    container_name: opencti-dev-kibana
    image: kibana:8.19.16
    environment:
      - ELASTICSEARCH_HOSTS=http://opencti-dev-elasticsearch:9200
    restart: unless-stopped
    ports:
      - 5601:5601
    depends_on:
      - opencti-dev-elasticsearch
  opencti-dev-smtp:
    container_name: opencti-dev-smtp
    image: maildev/maildev:2.2.1
    restart: unless-stopped
    ports:
      - 1025:1025
      - 1080:1080

  # Disabled by default, to run use:
  # podman compose --profile opensearch up -d
  # in opencti configuration:
  # "elasticsearch": {
  #     "url": "http://localhost:9201",
  #     "username": "admin",
  #     "password": "GraceH00per!"
  opencti-dev-opensearch:
    profiles: [opensearch]
    container_name: opencti-dev-opensearch
    build: ./opensearch
    volumes:
      - osdata:/usr/share/opensearch/data
      - ossnapshots:/usr/share/opensearch/snapshots
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms2G -Xmx2G
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=GraceH00per! # minimum 8 character password and must contain at least one uppercase letter, one lowercase letter, one digit, and one special character that is strong.
    ulimits:
      memlock:
        soft: -1 # Set memlock to unlimited (no soft or hard limit)
        hard: -1
      nofile:
        soft: 65536 # Maximum number of open files for the opensearch user - set to at least 65536
        hard: 65536
    ports:
      - 9201:9200
      - 9600:9600
  opencti-dev-opensearch-dashboards:
    profiles: [opensearch]
    image: opensearchproject/opensearch-dashboards:3.6.0
    container_name: opencti-dev-opensearch-dashboards
    ports:
      - 5602:5601 # Map host port 5601 to container port 5601
    expose:
      - 5602 # Expose port 5601 for web access to OpenSearch Dashboards
    environment:
      OPENSEARCH_HOSTS: '["http://opencti-dev-opensearch:9200"]' # Define the OpenSearch nodes that OpenSearch Dashboards will query
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"

  opencti-dev-rustfs:
    # RustFS — Apache-2.0, S3-compatible drop-in for MinIO (POC #16749).
    # S3 on 9000, console on 9001 (same defaults as MinIO); OpenCTI config (minio:*) unchanged.
    container_name: opencti-dev-rustfs
    image: rustfs/rustfs:latest
    user: "0:0" # safe choice for /data ownership on rootless Docker / Colima
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ROOT_USER: ChangeMe
      RUSTFS_ROOT_PASSWORD: ChangeMe
      RUSTFS_VOLUMES: /data
      RUSTFS_CONSOLE_ENABLE: "true" # admin console must be enabled explicitly (unlike MinIO's --console-address)
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001 # bind on all interfaces so the 9001 port mapping is reachable from the host
      RUSTFS_OBS_LOGGER_LEVEL: debug # POC: verbose logs for the compatibility validation pass (lower to info afterwards)
    volumes:
      - rustfsdata:/data
    restart: unless-stopped
  opencti-dev-rabbitmq:
    container_name: opencti-dev-rabbitmq
    image: rabbitmq:4.3.1-management
    restart: unless-stopped
    volumes:
      - ./rabbitmq.config:/etc/rabbitmq/conf.d/90-userdefined.conf
    ports:
      - 5672:5672
      - 15672:15672

  ## Telemetry + tracing dependencies
  ## podman compose --profile telemetry up -d (launch everything + telemetry)
  opencti-dev-telemetry-pyroscope:
    container_name: opencti-dev-telemetry-pyroscope
    image: grafana/pyroscope
    restart: unless-stopped
    ports:
      - "4040:4040"
    profiles:
      - "telemetry"
  opencti-dev-telemetry-jaegertracing:
    container_name: opencti-dev-telemetry-jaegertracing
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"
    profiles:
      - "telemetry"
  opencti-dev-telemetry-otlp:
    container_name: opencti-dev-telemetry-otlp
    image: otel/opentelemetry-collector-contrib:0.154.0
    restart: unless-stopped
    volumes:
      - "./otlp-config.yaml:/etc/config/otlp-config.yaml"
    command:
      - '--config=/etc/config/otlp-config.yaml'
    ports:
      - "1110:1110"
      - "8889:8889"
    profiles:
      - "telemetry"
  opencti-dev-telemetry-prometheus:
    container_name: opencti-dev-telemetry-prometheus
    image: prom/prometheus:v3.12.0
    restart: unless-stopped
    volumes:
      - "./prometheus.yml:/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    profiles:
      - "telemetry"
  opencti-dev-telemetry-grafana:
    image: grafana/grafana:13.1.0-25893932881
    container_name: opencti-dev-telemetry-grafana
    ports:
      - "3100:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - opencti-dev-telemetry-prometheus

  # SAML / OpenId provider with keycloak - disabled by default
  # docker compose --profile keycloak up -d
  opencti-dev-keycloak:
    profiles: [keycloak]
    image: quay.io/keycloak/keycloak:26.4.5
    volumes:
      - keycloakdata:/opt/keycloak/data
      - ./keycloak-configuration:/opt/keycloak/data/import
    container_name: opencti-dev-keycloak
    command: start-dev --import-realm --verbose
    # use below command to export a configuration. Remember to remove admin user.
    #command: export --dir /opt/keycloak/data/import/export --users same_file
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "admin"
    ports:
      - "9999:8080"

  opencti-dev-mokapi:
    image: mokapi/mokapi:latest
    profiles: [mokapi]
    container_name: opencti-dev-mokapi
    command: mokapi --providers.file.directory=/share
    volumes:
      - "./mock-api:/share"
    ports:
      - "8090:80"
      - "1389:389"
      - "9080:8080"

volumes:
  esdata:
    driver: local
  essnapshots:
    driver: local
  osdata:
    driver: local
  ossnapshots:
    driver: local
  keycloakdata:
    driver: local
  rustfsdata:
    driver: local
